name: Deploy to Cloudways

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CLOUDWAYS_HOST }}
          username: ${{ secrets.CLOUDWAYS_USERNAME }}
          key: ${{ secrets.CLOUDWAYS_SSH_KEY }}
          script: |
            git config --global --add safe.directory '*'
            cd ${{ secrets.CLOUDWAYS_GIT_PATH }}
            git pull origin main
            rsync -rlt --no-perms --no-owner --no-group --delete --exclude='.git' ${{ secrets.CLOUDWAYS_GIT_PATH }}/ ${{ secrets.CLOUDWAYS_APP_PATH }}/
